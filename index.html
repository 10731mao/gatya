<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>選択肢付きノベルゲーム</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#game{
width:700px;
}

#textbox{
background:rgba(0,0,0,0.8);
padding:30px;
border-radius:10px;
}

#name{
font-weight:bold;
margin-bottom:10px;
font-size:20px;
}

#text{
font-size:18px;
line-height:1.7;
min-height:80px;
}

#choices{
margin-top:20px;
}

.choice{
display:block;
margin-top:10px;
padding:12px;
background:#333;
border:none;
color:white;
cursor:pointer;
width:100%;
font-size:16px;
}

.choice:hover{
background:#555;
}

#next{
margin-top:15px;
text-align:right;
opacity:0.7;
}

#restart{
margin-top:20px;
padding:12px;
width:100%;
font-size:16px;
display:none;
cursor:pointer;
}

</style>
</head>

<body>

<div id="game">

<div id="textbox">

<div id="name"></div>
<div id="text"></div>

<div id="choices"></div>

<div id="next">クリックで進む</div>

<button id="restart">最初に戻る</button>

</div>

</div>

<script>

const story = {

start:{
name:"語り手",
text:"夜の森の前に立っている。",
next:"q1"
},

q1:{
name:"語り手",
text:"森の奥から、不思議な光が見える。",
choices:[
{text:"森に入る",next:"forest"},
{text:"町へ戻る",next:"town"}
]
},

forest:{
name:"主人公",
text:"……行ってみるか。",
next:"forest2"
},

forest2:{
name:"語り手",
text:"森の奥で、光る石を見つけた。",
choices:[
{text:"触る",next:"magic"},
{text:"無視する",next:"leave"}
]
},

magic:{
name:"語り手",
text:"石が強く輝き、あなたは不思議な力を得た。END"
},

leave:{
name:"語り手",
text:"あなたは石を無視して森を去った。END"
},

town:{
name:"主人公",
text:"今日はやめておこう。",
next:"endTown"
},

endTown:{
name:"語り手",
text:"あなたは安全に町へ帰った。END"
}

};

let current="start";

function showScene(){

const scene = story[current];

document.getElementById("name").textContent = scene.name;
document.getElementById("text").textContent = scene.text;

const choicesDiv = document.getElementById("choices");
choicesDiv.innerHTML="";

document.getElementById("restart").style.display="none";

if(scene.choices){

document.getElementById("next").style.display="none";

scene.choices.forEach(choice=>{
const btn=document.createElement("button");
btn.textContent=choice.text;
btn.className="choice";

btn.onclick=(e)=>{
e.stopPropagation();
current=choice.next;
showScene();
};

choicesDiv.appendChild(btn);
});

}else{

document.getElementById("next").style.display="block";

}

if(scene.text.includes("END")){
document.getElementById("next").style.display="none";
document.getElementById("restart").style.display="block";
}

}

document.getElementById("game").onclick=function(){

const scene = story[current];

if(scene.next){
current=scene.next;
showScene();
}

};

document.getElementById("restart").onclick=function(e){
e.stopPropagation();
current="start";
showScene();
};

showScene();

</script>

</body>
</html>
